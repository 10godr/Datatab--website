<!DOCTYPE html>
<html lang="es" class="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataTab - Inicio</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <!-- Fuentes: DM Sans para cuerpo, DM Serif Display para títulos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#2E7D32",
            "primary-light": "#388E3C",
            "background-light": "#F1F8E9",
            "background-dark": "#0f1a10",
            "card-light": "#FFFFFF",
            "card-dark": "#1a2e1b",
          },
        },
      },
    };
  </script>

  <style>
    body { font-family: 'DM Sans', sans-serif; min-height: 100dvh; }
    .font-display { font-family: 'DM Serif Display', serif; }
    .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    #dropzone.drag-over { border-color: #2E7D32 !important; background-color: rgba(46,125,50,0.1) !important; }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-200 min-h-screen flex flex-col transition-colors duration-300">

  <!-- HEADER -->
  <header class="sticky top-0 z-50 ios-blur bg-white/80 dark:bg-black/60 border-b border-slate-200 dark:border-slate-800 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-primary text-2xl">bar_chart</span>
      <span class="font-display text-xl text-primary tracking-tight">DataTab</span>
    </div>
    <div class="flex items-center gap-5">
      <span class="text-slate-500 dark:text-slate-400 text-sm font-medium">Inicio</span>
      <button class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors"
              onclick="document.documentElement.classList.toggle('dark')">
        <span class="material-symbols-outlined text-[18px] dark:hidden text-slate-500">light_mode</span>
        <span class="material-symbols-outlined text-[18px] hidden dark:block text-slate-400">dark_mode</span>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-lg bg-card-light dark:bg-card-dark rounded-2xl shadow-xl shadow-black/5 dark:shadow-black/40 border border-slate-100 dark:border-slate-800 overflow-hidden">
      <div class="p-8">
        <h1 class="font-display text-3xl text-slate-800 dark:text-white mb-2">Cargar Datos</h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed mb-8">
          Arrastra y suelta tu archivo Excel o CSV aquí, o haz clic para seleccionarlo.
        </p>

        <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
          <div id="dropzone" class="relative group cursor-pointer border-2 border-dashed border-primary/25 dark:border-primary/20 bg-primary/5 dark:bg-primary/10 rounded-xl p-12 flex flex-col items-center justify-center transition-all hover:border-primary/60 hover:bg-primary/10">
            <input id="fileInput" type="file" name="file" accept=".xlsx,.xls,.csv"
              class="absolute inset-0 w-full h-full opacity-0 z-10 cursor-pointer" required>

            <div class="w-16 h-16 bg-white dark:bg-slate-800 rounded-2xl flex items-center justify-center shadow-md mb-5 transition-transform group-hover:scale-105">
              <span class="material-symbols-outlined text-primary text-3xl">upload_file</span>
            </div>
            <p id="uploadText" class="text-primary font-semibold text-base text-center mb-1">Haz clic para cargar</p>
            <p class="text-slate-400 dark:text-slate-500 text-sm text-center">o arrastra y suelta</p>
            <div class="mt-5 px-3 py-1.5 bg-white/60 dark:bg-black/20 rounded-full border border-slate-100 dark:border-slate-700">
              <p class="text-[11px] font-medium text-slate-400 dark:text-slate-500 uppercase tracking-widest">
                XLSX · XLS · CSV &nbsp;(máx. 5MB)
              </p>
            </div>
          </div>

          <!-- Barra de progreso -->
          <div id="progressBar" class="hidden mt-5">
            <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-1.5">
              <div class="bg-primary h-1.5 rounded-full animate-pulse" style="width:70%"></div>
            </div>
            <p class="text-xs text-slate-400 mt-2 text-center">Procesando archivo...</p>
          </div>

          <button id="submitBtn" type="submit" class="hidden"></button>
        </form>
      </div>

      <div class="bg-slate-50 dark:bg-black/20 px-6 py-4 flex items-center justify-center border-t border-slate-100 dark:border-slate-800">
        <p class="text-xs text-slate-400 dark:text-slate-500">
          Creado por <span class="text-slate-600 dark:text-slate-300 font-semibold">Diego Rodríguez</span>
        </p>
      </div>
    </div>
  </main>

  <footer class="px-6 py-4 text-center">
    <p class="text-xs text-slate-400">© 2025 DataTab v2.0</p>
  </footer>

  <script>
    const fileInput = document.getElementById("fileInput");
    const form = document.getElementById("uploadForm");
    const uploadText = document.getElementById("uploadText");
    const progressBar = document.getElementById("progressBar");
    const dropzone = document.getElementById("dropzone");

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) {
        uploadText.textContent = fileInput.files[0].name;
        progressBar.classList.remove("hidden");
        form.submit();
      }
    });

    dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("drag-over"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-over"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("drag-over");
      if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event("change"));
      }
    });
  </script>
</body>
</html>
